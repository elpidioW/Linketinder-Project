<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <div>



        

        <form id="formularioCadastroUsuario">

            <input type="hidden" id="idTarefa">

            <label for="nome">Nome</label>
            <input type="text" name="nome" id="nome" required>
            <br>

            <label for="email">Email:</label>
            <input type="email" id="email" name="email" required>
            <br>

            <label for="cpf">CPF:</label>
            <input type="text" id="cpf" name="cpf" required>
            <br>

            <label for="idade">Idade:</label>
            <input type="number" id="idade" name="idade" required>
            <br>

            <label for="estado">Estado:</label>
            <input type="text" id="estado" name="estado" required>
            <br>

            <label for="cep">CEP:</label>
            <input type="text" id="cep" name="cep" required>
            <br>

            <label for="descricao">Descrição:</label>
            <textarea name="descricao" id="descricao" rows="3"></textarea>
            <br>

            <label for="termos">Competencias:</label>
            <input type="checkbox" name="opcao" value="java"> Java
            <input type="checkbox" name="opcao" value="python"> Python
            <input type="checkbox" name="opcao" value="javascript"> JavaScript
            <input type="checkbox" name="opcao" value="github"> GitHub
            <input type="checkbox" name="opcao" value="php"> PHP

            

            <div class="botoes">
                <button type="submit">Salvar</button>
                <button type="button" id="botao_deletar">Deletar</button>
                <button type="button" id="botao_cancelar">Cancelar</button>
            </div>

        </form>








    </div>


    <script src="cadastro-candidato.js"></script>
</body>
</html>
