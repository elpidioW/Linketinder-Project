<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <div>


        <form id="formularioCadastroEmpresa">

            <input type="hidden" id="idTarefa">

            <label for="nome">Nome:</label>
            <input type="text" name="nome" id="nome" required>
            <br>

            <label for="email">Email:</label>
            <input type="email" id="email" name="email" required>
            <br>

            <label for="cnpj">CNPJ:</label>
            <input type="text" id="cnpj" name="cnpj" required>
            <br>

            <label for="pais">País:</label>
            <input type="text" id="pais" name="pais" required>
            <br>

            <label for="estado">Estado:</label>
            <input type="text" id="estado" name="estado" required>
            <br>

            <label for="cep">CEP:</label>
            <input type="text" id="cep" name="cep" required>
            <br>

            <label for="descricao">Descrição:</label>
            <textarea name="descricao" id="descricao" rows="3"></textarea>
            <br>




            <hr>
            <h3>Vaga 1</h3>
            <label for="tituloVaga1">Título da vaga:</label>
            <input type="text" id="tituloVaga1" required>
            <br><br>

            <label for="descricaoVaga1">Descrição da vaga:</label>
            <textarea id="descricaoVaga1" rows="2"></textarea>
            <br><br>

            <label>Competências da vaga 1:</label><br>
            <input type="checkbox" name="competenciaVaga1" value="java"> Java
            <input type="checkbox" name="competenciaVaga1" value="python"> Python
            <input type="checkbox" name="competenciaVaga1" value="javascript"> JavaScript
            <input type="checkbox" name="competenciaVaga1" value="github"> GitHub
            <input type="checkbox" name="competenciaVaga1" value="php"> PHP

            <br><br>
            <hr>
            <h3>Vaga 2</h3>

            <label for="tituloVaga2">Título da vaga:</label>
            <input type="text" id="tituloVaga2" required>
            <br><br>

            <label for="descricaoVaga2">Descrição da vaga:</label>
            <textarea id="descricaoVaga2" rows="2"></textarea>
            <br><br>

            <label>Competências da vaga 2:</label><br>
            <input type="checkbox" name="competenciaVaga2" value="java"> Java
            <input type="checkbox" name="competenciaVaga2" value="python"> Python
            <input type="checkbox" name="competenciaVaga2" value="javascript"> JavaScript
            <input type="checkbox" name="competenciaVaga2" value="github"> GitHub
            <input type="checkbox" name="competenciaVaga2" value="php"> PHP

            <br><br>



            
            <div class="botoes">
                <button type="submit">Salvar</button>
                <button type="button" id="botao_deletar">Deletar</button>
                <button type="button" id="botao_cancelar">Cancelar</button>
            </div>

        </form>



    </div>


    <script type="module" src="cadastro-empresa.js"></script>
</body>
</html>
